<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Seamless Studio – Mock-up Studio</title>
<style>
  :root{
    --bg1:#0a0a1a;
    --bg2:#16213e;
    --panel:rgba(22,33,62,.88);
    --panel-soft:rgba(10,10,26,.35);
    --line:rgba(138,122,255,.28);
    --accent:#8a7aff;
    --accent2:#6b5fd3;
    --text:#ffffff;
    --muted:#cabdff;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--text);
    background:linear-gradient(135deg,var(--bg1) 0%, var(--bg2) 100%);
    min-height:100vh;
  }
  .wrap{
    max-width:1200px;
    margin:0 auto;
    padding:22px;
  }
  .hero{
    text-align:center;
    margin-bottom:18px;
  }
  .hero h1{
    margin:0;
    font-size:clamp(2rem,4vw,3.3rem);
  }
  .hero p{
    margin:8px 0 0;
    color:var(--muted);
  }
  .layout{
    display:grid;
    grid-template-columns:350px minmax(0,1fr);
    gap:20px;
  }
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:26px;
    padding:18px;
    box-shadow:0 14px 36px rgba(0,0,0,.24);
  }

  /* 🌸 NEW MOCKUP PANEL TEXTURE */
  .mockup-panel{
    position:relative;
    overflow:hidden;
  }
  .mockup-panel::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:url('flower_tile.png');
    background-size:360px;
    opacity:0.018;
    filter:blur(0.8px);
    pointer-events:none;
  }

  .panel h2{
    margin:0 0 4px;
    font-size:1.08rem;
  }
  .subtitle{
    font-size:.9rem;
    color:var(--muted);
    margin-bottom:10px;
  }

  label{
    display:block;
    font-size:.92rem;
    margin:14px 0 7px;
    color:#e7deff;
  }
  input[type="range"]{width:100%; accent-color:var(--accent);}
  .value{color:var(--accent); font-weight:700;}

  button{
    border:none;
    border-radius:999px;
    padding:12px 18px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff;
    font-weight:700;
    cursor:pointer;
  }
  button.secondary{ background:#2b3e6e; }

  .row{display:flex; gap:10px; margin-top:14px;}
  .row button{flex:1;}

  .status{
    margin-top:14px;
    padding:12px 14px;
    border-radius:16px;
    background:var(--panel-soft);
    color:#efeaff;
  }

  .preview-shell{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:640px;
    background:rgba(10,10,26,.18);
    border-radius:22px;
    padding:16px;
  }

  canvas{
    max-width:100%;
    border-radius:18px;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="hero">
    <h1>Seamless Studio</h1>
    <p>bringing your pattern to life ✨</p>
  </div>

  <div class="layout">

    <div class="panel mockup-panel">
      <h2>Mock-up Studio ✿</h2>
      <div class="subtitle">See your pattern come to life on real products</div>

      <label>Upload your pattern</label>
      <input type="file" />

      <label>Pattern scale <span class="value">14%</span></label>
      <input type="range" value="14"/>

      <div class="row">
        <button>Render mug</button>
        <button class="secondary">Download PNG</button>
      </div>

      <div class="status">
        Your mock-up is ready ✨
      </div>
    </div>

    <div class="panel">
      <div class="preview-shell">
        <canvas></canvas>
      </div>
    </div>

  </div>
</div>

</body>
</html>
