
<!DOCTYPE html>
<html lang="en"> 
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Seamless Studio – Mug Mock-up Teaser</title>
<style>
  :root{
    --bg1:#0a0a1a;
    --bg2:#16213e;
    --panel:rgba(22,33,62,.88);
    --panel-soft:rgba(10,10,26,.35);
    --line:rgba(138,122,255,.28);
    --accent:#8a7aff;
    --accent2:#6b5fd3;
    --text:#ffffff;
    --muted:#cabdff;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--text);
    background:linear-gradient(135deg,var(--bg1) 0%, var(--bg2) 100%);
    min-height:100vh;
  }
  .wrap{
    max-width:1200px;
    margin:0 auto;
    padding:22px;
  }
  .hero{
    text-align:center;
    margin-bottom:18px;
  }
  .hero h1{
    margin:0;
    font-size:clamp(2rem,4vw,3.3rem);
    letter-spacing:.01em;
  }
  .hero p{
    margin:8px 0 0;
    color:var(--muted);
    font-size:1rem;
  }
  .layout{
    display:grid;
    grid-template-columns:350px minmax(0,1fr);
    gap:20px;
    align-items:start;
  }
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:26px;
    padding:18px;
    box-shadow:0 14px 36px rgba(0,0,0,.24);
  }
  .panel h2{
    margin:0 0 8px;
    font-size:1.08rem;
  }
  label{
    display:block;
    font-size:.92rem;
    margin:14px 0 7px;
    color:#e7deff;
  }
  input[type="file"], input[type="range"]{
    width:100%;
  }
  input[type="range"]{
    accent-color:var(--accent);
  }
  .value{
    color:var(--accent);
    font-weight:700;
  }
  button{
    border:none;
    border-radius:999px;
    padding:12px 18px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff;
    font-weight:700;
    cursor:pointer;
  }
  button.secondary{
    background:#2b3e6e;
  }
  .row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:14px;
  }
  .row button{ flex:1; }
  .status{
    margin-top:14px;
    padding:12px 14px;
    border-radius:16px;
    background:var(--panel-soft);
    line-height:1.4;
    color:#efeaff;
    min-height:24px;
  }
  .small{
    color:#b8b1d9;
    font-size:.9rem;
    line-height:1.5;
    margin-top:14px;
  }
  .preview-shell{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:640px;
    background:rgba(10,10,26,.18);
    border:1px solid rgba(138,122,255,.16);
    border-radius:22px;
    padding:16px;
  }
  canvas{
    max-width:100%;
    max-height:76vh;
    border-radius:18px;
    background:#0a0a1a;
  }
  .ok{ color:#97f0b2; }
  .warn{ color:#ffd47a; }
  @media (max-width:900px){
    .layout{ grid-template-columns:1fr; }
    .preview-shell{ min-height:auto; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>Seamless Studio</h1>
    <p>bringing your pattern to life ✨</p>
  </div>

  <div class="layout">
    <div class="panel">
      <h2>Mug mock-up teaser</h2>

      <label>Upload your pattern</label>
      <input id="patternInput" type="file" accept="image/png,image/jpeg,image/webp" />

      <label>Pattern scale <span class="value" id="scaleValue">14%</span></label>
      <input id="scaleSlider" type="range" min="8" max="60" step="1" value="14" />

      <label>Offset X <span class="value" id="offsetXValue">0px</span></label>
      <input id="offsetX" type="range" min="-1200" max="1200" step="1" value="0" />

      <label>Offset Y <span class="value" id="offsetYValue">0px</span></label>
      <input id="offsetY" type="range" min="-1200" max="1200" step="1" value="0" />

      <label>Highlight strength <span class="value" id="highlightValue">100%</span></label>
      <input id="highlightStrength" type="range" min="20" max="160" step="1" value="100" />

      <div class="row">
        <button id="renderBtn">Render mug</button>
        <button id="downloadBtn" class="secondary">Download PNG</button>
      </div>

      <div class="status" id="status">
        Upload a pattern, then tap Render mug.
      </div>

      <div class="small">
        Put this HTML in the same GitHub Pages folder as:
        <br><strong>background_mug.png</strong>
        <br><strong>mask_mug.png</strong>
        <br><strong>shadow.png</strong>
        <br><strong>highlight_mug.png</strong> <span style="opacity:.8">(optional)</span>
        <br><br>
        If <strong>highlight_mug.png</strong> is missing, the teaser still works.
      </div>
    </div>

    <div class="panel">
      <div class="preview-shell">
        <canvas id="previewCanvas" width="1600" height="1200"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
const patternInput = document.getElementById('patternInput');
const scaleSlider = document.getElementById('scaleSlider');
const offsetX = document.getElementById('offsetX');
const offsetY = document.getElementById('offsetY');
const highlightStrength = document.getElementById('highlightStrength');

const scaleValue = document.getElementById('scaleValue');
const offsetXValue = document.getElementById('offsetXValue');
const offsetYValue = document.getElementById('offsetYValue');
const highlightValue = document.getElementById('highlightValue');

const renderBtn = document.getElementById('renderBtn');
const downloadBtn = document.getElementById('downloadBtn');
const statusEl = document.getElementById('status');
const canvas = document.getElementById('previewCanvas');
const ctx = canvas.getContext('2d');

let patternImg = null;
let baseImg = null;
let maskImg = null;
let shadingImg = null;
let highlightImg = null;
let renderedOnce = false;

function setStatus(msg){
  statusEl.innerHTML = msg;
}

function updateValues(){
  scaleValue.textContent = scaleSlider.value + '%';
  offsetXValue.textContent = offsetX.value + 'px';
  offsetYValue.textContent = offsetY.value + 'px';
  highlightValue.textContent = highlightStrength.value + '%';
}
updateValues();

[scaleSlider, offsetX, offsetY, highlightStrength].forEach(el => {
  el.addEventListener('input', () => {
    updateValues();
    if (renderedOnce && patternImg && baseImg && maskImg && shadingImg) renderMockup();
  });
});

function readFileAsDataURL(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function loadImage(src){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

async function loadAssetOptional(src){
  try { return await loadImage(src); } catch (e) { return null; }
}

async function loadAssets(){
  [baseImg, maskImg, shadingImg, highlightImg] = await Promise.all([
    loadImage('./mockup_mug.png'),
    loadImage('./mask_mug.png'),
    loadImage('./shadow_mug.png'),
    loadAssetOptional('./highlight_mug.png')
  ]);
}

patternInput.addEventListener('change', async (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  try{
    const dataUrl = await readFileAsDataURL(file);
    patternImg = await loadImage(dataUrl);
    setStatus('<span class="ok">Pattern loaded.</span> Tap Render mug.');
  } catch(err){
    console.error(err);
    setStatus('<span class="warn">Could not load pattern.</span>');
  }
});

async function renderMockup(){
  if (!patternImg){
    setStatus('<span class="warn">Please upload a pattern first.</span>');
    return;
  }

  try{
    setStatus('Loading mug assets...');
    if (!baseImg || !maskImg || !shadingImg){
      await loadAssets();
    }

    canvas.width = baseImg.naturalWidth || baseImg.width;
    canvas.height = baseImg.naturalHeight || baseImg.height;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    ctx.drawImage(baseImg, 0, 0, canvas.width, canvas.height);

    const mockupScale = Number(scaleSlider.value) / 100;
    const tileCanvas = document.createElement('canvas');
    tileCanvas.width = Math.max(1, Math.round((patternImg.naturalWidth || patternImg.width) * mockupScale));
    tileCanvas.height = Math.max(1, Math.round((patternImg.naturalHeight || patternImg.height) * mockupScale));

    const tileCtx = tileCanvas.getContext('2d');
    tileCtx.imageSmoothingEnabled = true;
    tileCtx.imageSmoothingQuality = 'high';
    tileCtx.drawImage(patternImg, 0, 0, tileCanvas.width, tileCanvas.height);

    const patternLayer = document.createElement('canvas');
    patternLayer.width = canvas.width;
    patternLayer.height = canvas.height;
    const pctx = patternLayer.getContext('2d');
    pctx.imageSmoothingEnabled = true;
    pctx.imageSmoothingQuality = 'high';

    const pat = pctx.createPattern(tileCanvas, 'repeat');
    pctx.save();
    pctx.translate(Number(offsetX.value), Number(offsetY.value));
    pctx.fillStyle = pat;
    pctx.fillRect(
      -Math.abs(Number(offsetX.value)) - tileCanvas.width,
      -Math.abs(Number(offsetY.value)) - tileCanvas.height,
      patternLayer.width + Math.abs(Number(offsetX.value))*2 + tileCanvas.width*2,
      patternLayer.height + Math.abs(Number(offsetY.value))*2 + tileCanvas.height*2
    );
    pctx.restore();

    const maskInsetLeft = Math.round(canvas.width * 0.006);
    const maskInsetRight = Math.round(canvas.width * 0.012);
    const maskInsetTop = Math.round(canvas.height * 0.006);
    const maskInsetBottom = Math.round(canvas.height * 0.008);

    pctx.save();
    pctx.globalCompositeOperation = 'destination-in';
    pctx.filter = 'blur(0.8px)';
    pctx.drawImage(
      maskImg,
      maskInsetLeft,
      maskInsetTop,
      patternLayer.width - maskInsetLeft - maskInsetRight,
      patternLayer.height - maskInsetTop - maskInsetBottom
    );
    pctx.restore();

    ctx.save();
    ctx.globalAlpha = 1.0;
    ctx.globalCompositeOperation = 'multiply';
    ctx.drawImage(patternLayer, 0, 0, canvas.width, canvas.height);
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.drawImage(baseImg, 0, 0, canvas.width, canvas.height);
    ctx.restore();

    ctx.globalCompositeOperation = 'multiply';
    ctx.drawImage(shadingImg, 0, 0, canvas.width, canvas.height);
    ctx.globalCompositeOperation = 'source-over';

    if (highlightImg) {
      const h = Number(highlightStrength.value || 100) / 100;

      ctx.save();
      ctx.globalAlpha = 0.55 * h;
      ctx.globalCompositeOperation = 'screen';
      ctx.drawImage(highlightImg, 0, 0, canvas.width, canvas.height);
      ctx.restore();

      ctx.save();
      ctx.globalAlpha = 0.28 * h;
      ctx.globalCompositeOperation = 'lighter';
      ctx.drawImage(highlightImg, 0, 0, canvas.width, canvas.height);
      ctx.restore();
    }

    renderedOnce = true;
    setStatus('<span class="ok">Mug teaser rendered.</span> Ready for a screen recording 👀');
  } catch(err){
    console.error(err);
    setStatus('<span class="warn">Could not load one or more mug assets.</span> Check the file names in your GitHub Pages folder.');
  }
}

renderBtn.addEventListener('click', renderMockup);

downloadBtn.addEventListener('click', () => {
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'seamless-studio-mug-teaser.png';
  a.click();
});
</script>
</body>
</html>
